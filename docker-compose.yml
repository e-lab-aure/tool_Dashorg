services:
  dashorg:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashorg
    restart: unless-stopped
    ports:
      # Modifier le port de gauche si 3000 est deja utilise sur le NAS
      - "3000:3000"
    volumes:
      # Code source Git — le repo clone est monte tel quel dans le conteneur.
      # Le chemin est relatif : on lance docker-compose depuis /volume1/docker/dashorg/src
      - .:/app
      # Base de donnees SQLite persistante, en dehors du code source
      - ../data:/app/data
    env_file:
      # Fichier .env a placer dans /volume1/docker/dashorg/src/ (ou symlink depuis le repo)
      - .env
    environment:
      - NODE_ENV=production
