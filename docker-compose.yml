services:
  dashorg:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashorg
    restart: unless-stopped
    ports:
      # Modifier le port de gauche si 3000 est deja utilise sur le NAS
      - "3000:3000"
    volumes:
      # Code source Git — monte depuis le NAS, mis a jour par l'entrypoint
      # Ce dossier DOIT etre un repo Git clone (git clone ... /volume1/docker/dashorg/src)
      - /volume1/docker/dashorg/src:/app
      # Base de donnees SQLite — separee du code pour eviter tout ecrasement
      - /volume1/docker/dashorg/data:/app/data
    env_file:
      # Fichier .env a placer dans /volume1/docker/dashorg/ sur le NAS
      - /volume1/docker/dashorg/.env
    environment:
      - NODE_ENV=production
